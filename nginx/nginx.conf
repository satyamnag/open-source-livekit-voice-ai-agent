# nginx/conf/nginx.conf

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream to LiveKit signaling (WebSocket over HTTP, will be upgraded to WSS by this proxy)
    upstream livekit_signaling {
        server livekit:7880;
        keepalive 64;
    }

    server {
        listen 8080;
        server_name web;

        location / {
            proxy_pass http://peermetrics-web:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/web/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    server {
        listen 8081;
        server_name api;

        # Handle legacy endpoints that don't have /v1/ prefix
        location ~ ^/(?!v1/|static/|health)(.*)$ {
            rewrite ^/(.*)$ /v1/$1 last;
        }

        location / {
            proxy_pass http://peermetrics-api:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /app/api/;
        }
    }

    # HTTPS entrypoint to terminate TLS and proxy WSS to LiveKit
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/certs/fullchain.pem;
        ssl_certificate_key /etc/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Optional HSTS (uncomment after validating certs)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy WSS signaling to LiveKit
        location /livekit {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://livekit_signaling;
        }

        # Proxy Next.js playground under /playground (strip prefix)
        location = /playground {
            return 301 /playground/;
        }

        location /playground/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://agents-playground:3000/;
        }

        # Optionally serve your web app over HTTPS too (keeps same origin with WSS)
        location / {
            proxy_pass http://peermetrics-web:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}